<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A2 Mluvení Sprint — CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght,SOFT@9..144,400..700,0..100&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Inter', system-ui, sans-serif; background: #F5EDDD; color: #14110C; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  ::selection { background: #FFD7B8; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .scrollarea::-webkit-scrollbar { width: 8px; height: 8px; }
  .scrollarea::-webkit-scrollbar-thumb { background: rgba(20,18,14,0.15); border-radius: 999px; }
  .scrollarea::-webkit-scrollbar-track { background: transparent; }
  .row-hover:hover { background: #FFF8EA !important; }
  .nav-item:hover:not(.active) { background: rgba(20,18,14,0.04) !important; }
  .input-focus:focus-within { border-color: #FF6A14 !important; box-shadow: 0 0 0 3px rgba(255,106,20,0.12) !important; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="cms-tokens.jsx"></script>
<script type="text/babel" src="cms-shell.jsx"></script>
<script type="text/babel" src="cms-dashboard.jsx"></script>
<script type="text/babel" src="cms-courses.jsx"></script>
<script type="text/babel" src="cms-editor.jsx"></script>
<script type="text/babel" src="cms-mock.jsx"></script>
<script type="text/babel" src="cms-learners.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

function App() {
  const [route, setRoute] = useState({ page: 'dashboard' });
  const go = (page, params = {}) => setRoute({ page, ...params });

  let content;
  switch (route.page) {
    case 'dashboard': content = <Dashboard go={go} />; break;
    case 'courses': content = <CoursesPage go={go} />; break;
    case 'course-detail': content = <CourseDetail go={go} courseId={route.id} />; break;
    case 'editor': content = <ExerciseEditor go={go} exerciseId={route.id} />; break;
    case 'mock': content = <MockBuilder go={go} mockId={route.id} />; break;
    case 'mock-list': content = <MockListPage go={go} />; break;
    case 'learners': content = <LearnersPage go={go} />; break;
    case 'learner-detail': content = <LearnerDetail go={go} learnerId={route.id} />; break;
    default: content = <Dashboard go={go} />;
  }

  return <CMSShell route={route} go={go}>{content}</CMSShell>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
