name: Release Images

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cms/package-lock.json

      - name: Install CMS dependencies
        working-directory: cms
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: go build ./...

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Lint CMS
        working-directory: cms
        run: npm run lint

      - name: Build CMS
        working-directory: cms
        run: npm run build

  publish:
    runs-on: ubuntu-latest
    needs: verify
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      ECR_BACKEND_REPOSITORY: ${{ vars.ECR_BACKEND_REPOSITORY }}
      ECR_CMS_REPOSITORY: ${{ vars.ECR_CMS_REPOSITORY }}
      IMAGE_PLATFORM: linux/arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate release configuration
        run: |
          test -n "${AWS_REGION}"
          test -n "${AWS_ACCOUNT_ID}"
          test -n "${AWS_ROLE_TO_ASSUME}"
          test -n "${ECR_BACKEND_REPOSITORY}"
          test -n "${ECR_CMS_REPOSITORY}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push release images
        env:
          IMAGE_TAG: ${{ github.ref_name }}
          ECR_REGISTRY: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          BACKEND_IMAGE_REPO: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_BACKEND_REPOSITORY }}
          CMS_IMAGE_REPO: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_CMS_REPOSITORY }}
          USE_DOCKER_BUILDX: "1"
        run: |
          IMAGE_TAG="${IMAGE_TAG#v}"
          export IMAGE_TAG
          sh scripts/build-push-images.sh
